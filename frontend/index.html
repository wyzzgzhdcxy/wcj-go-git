<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git同步工具</title>
    <script type="module" src="src/pages/js/index.js"></script>
    <link rel="stylesheet" href="src/pages/css/index.css">
</head>
<style>
    html {
        width: 100%;
        height: 100%;
    }

    body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow-y: hidden;
    }

    #toggleDiv {
        top: 150px;
        left: 300px;
        z-index: 1001;
        position: fixed;
        width: 600px;
        height: 400px;
        border: 1px solid #ccc;
        border-radius: 5px;
        margin-top: 20px;
        display: none;
    }

    .header {
        background-color: #f0f0f0;
        padding: 10px;
        cursor: pointer;
        font-weight: bold;
    }

    .content {
        padding: 10px;
        border-top: 1px solid #ccc;
    }
</style>
<script>
    function toggleDiv(errorInfo) {
        const indexErrorDiv = document.getElementById('indexErrorDiv');
        indexErrorDiv.innerHTML = errorInfo.message;
        const content = document.querySelector('#toggleDiv');
        if (content.style.display === 'none' || content.style.display === '') {
            content.style.display = 'block';
        } else {
            content.style.display = 'none';
        }
        const appDiv = document.querySelector('#app');
        appDiv.style.display = 'none';
    }
</script>
<body>
<div id="app" style="width: 100%;height: 100%"></div>

<div id="toggleDiv">
    <div class="header">错误信息:</div>
    <div class="content" id="indexErrorDiv">
        因为你的不正当操作，软件出现致命问题！
    </div>
</div>

</body>
</html>
